    <path d="M12 9v4l2.5 2.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M4.5 4.5L3 3M19.5 4.5L21 3" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <rect x="7" y="1" width="10" height="4" rx="1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <text x="8.5" y="4.2" font-size="2.8" font-family="monospace" fill="currentColor" stroke="none">24h</text>
  </symbol>

