    <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <polyline points="14 6 20 12 14 18" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- ic-shaft: elevator shaft with guide rails, cab, and counterweight -->
  <symbol id="ic-shaft" viewBox="0 0 24 24" fill="none">
    <!-- Shaft walls -->
    <rect x="2" y="1" width="20" height="22" rx="1" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left guide rail -->
    <line x1="5.5" y1="2" x2="5.5" y2="23" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
    <!-- Right guide rail -->
    <line x1="18.5" y1="2" x2="18.5" y2="23" stroke="currentColor" stroke-width="1.25" stroke-linecap="round"/>
    <!-- Cabin -->
    <rect x="7" y="10" width="10" height="8" rx="0.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cabin door line -->
    <line x1="12" y1="10" x2="12" y2="18" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <!-- Counterweight -->
    <rect x="7.5" y="3" width="3" height="4" rx="0.5" stroke="currentColor" stroke-width="1.25"/>
    <!-- Rope from cabin to counterweight -->
    <line x1="12" y1="3" x2="12" y2="10" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-dasharray="1.5 1"/>
    <!-- Rail brackets -->
    <line x1="5.5" y1="7" x2="7" y2="7" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <line x1="18.5" y1="7" x2="17" y2="7" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <line x1="5.5" y1="14" x2="7" y2="14" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
    <line x1="18.5" y1="14" x2="17" y2="14" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  </symbol>

</svg>
