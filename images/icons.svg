  </symbol>

  <!-- ic-whatsapp: WhatsApp-style speech bubble with phone inside -->
  <symbol id="ic-whatsapp" viewBox="0 0 24 24" fill="none">
    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M9.5 9.5c.2.6.6 1.1.9 1.7.2.3.1.7-.1 1l-.5.7c.4.8.9 1.5 1.6 2 .5.4 1.1.7 1.7.9.3.1.6 0 .8-.2l.6-.6c.3-.3.7-.3 1-.2.5.2 1 .5 1.5.7.2.1.3.3.3.5v1.5c0 .3-.2.5-.5.5-4.5.2-8-3.3-7.8-7.8 0-.3.2-.5.5-.5h1.5c.2 0 .4.1.5.3Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- ic-arrow-right: simple right arrow -->
