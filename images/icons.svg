    <path d="M14 2v6h6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="7" y="12" width="10" height="7" rx="1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="12" cy="15.5" r="1.75" stroke="currentColor" stroke-width="1.25"/>
    <circle cx="15.5" cy="13.5" r="0.75" fill="currentColor" stroke="none"/>
