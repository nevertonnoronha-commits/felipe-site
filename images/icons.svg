    <line x1="3" y1="19" x2="21" y2="19" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="6" y1="9" x2="6" y2="19" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="10" y1="9" x2="10" y2="19" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="14" y1="9" x2="14" y2="19" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="18" y1="9" x2="18" y2="19" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
