    <line x1="4" y1="4" x2="18" y2="4" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="4" y1="4" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="4" x2="14" y2="10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="10" x2="14" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
