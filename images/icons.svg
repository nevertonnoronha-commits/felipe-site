    <rect x="14" y="2" width="7" height="6" rx="1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="16" y1="4" x2="16" y2="4.01" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="18.5" y1="4" x2="18.5" y2="4.01" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    <line x1="16" y1="6" x2="18.5" y2="6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </symbol>

  <!-- ic-corretiva: bolt/spark -->
