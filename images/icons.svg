    <rect x="6.5" y="9.5" width="2" height="2" rx="0.4" stroke="currentColor" stroke-width="1.2"/>
    <rect x="10" y="9.5" width="2" height="2" rx="0.4" stroke="currentColor" stroke-width="1.2"/>
    <rect x="13.5" y="9.5" width="1.5" height="2" rx="0.4" stroke="currentColor" stroke-width="1.2"/>
    <rect x="6.5" y="13.5" width="2" height="2" rx="0.4" stroke="currentColor" stroke-width="1.2"/>
    <rect x="10" y="13.5" width="2" height="2" rx="0.4" stroke="currentColor" stroke-width="1.2"/>
