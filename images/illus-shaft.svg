<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" width="100%" height="100%">
  <defs>
    <linearGradient id="shaft-wall-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d3a8a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b6fd4" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="cab-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2fb"/>
      <stop offset="100%" stop-color="#dce6f8"/>
    </linearGradient>
    <linearGradient id="rail-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b6fd4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1d3a8a" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1d3a8a" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background shaft structure -->
  <!-- Outer shaft walls (cutaway view — left and right walls visible, open front) -->
  <rect x="80" y="20" width="320" height="560" rx="4" fill="url(#shaft-wall-grad)" stroke="#1d3a8a" stroke-width="2" stroke-opacity="0.25"/>

  <!-- Shaft left wall detail lines (concrete texture suggestion) -->
  <line x1="80" y1="80" x2="80" y2="580" stroke="#1d3a8a" stroke-width="3" stroke-opacity="0.35"/>
  <line x1="400" y1="80" x2="400" y2="580" stroke="#1d3a8a" stroke-width="3" stroke-opacity="0.35"/>

  <!-- Horizontal floor markers in shaft (landing floors) -->
  <!-- Floor 4 -->
  <line x1="80" y1="90" x2="110" y2="90" stroke="#3b6fd4" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="370" y1="90" x2="400" y2="90" stroke="#3b6fd4" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="55" y="94" font-family="'Space Grotesk', Inter, sans-serif" font-size="11" fill="#1d3a8a" fill-opacity="0.5" text-anchor="end">4°</text>

  <!-- Floor 3 -->
  <line x1="80" y1="210" x2="110" y2="210" stroke="#3b6fd4" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="370" y1="210" x2="400" y2="210" stroke="#3b6fd4" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="55" y="214" font-family="'Space Grotesk', Inter, sans-serif" font-size="11" fill="#1d3a8a" fill-opacity="0.5" text-anchor="end">3°</text>

  <!-- Floor 2 -->
  <line x1="80" y1="330" x2="110" y2="330" stroke="#3b6fd4" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="370" y1="330" x2="400" y2="330" stroke="#3b6fd4" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="55" y="334" font-family="'Space Grotesk', Inter, sans-serif" font-size="11" fill="#1d3a8a" fill-opacity="0.5" text-anchor="end">2°</text>

  <!-- Floor 1 / Térreo -->
  <line x1="80" y1="450" x2="110" y2="450" stroke="#3b6fd4" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="370" y1="450" x2="400" y2="450" stroke="#3b6fd4" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="55" y="454" font-family="'Space Grotesk', Inter, sans-serif" font-size="11" fill="#1d3a8a" fill-opacity="0.5" text-anchor="end">1°</text>

  <!-- Pit line -->
  <line x1="80" y1="540" x2="400" y2="540" stroke="#1d3a8a" stroke-width="2" stroke-opacity="0.2"/>
  <text x="240" y="558" font-family="'Space Grotesk', Inter, sans-serif" font-size="10" fill="#1d3a8a" fill-opacity="0.4" text-anchor="middle">FOSSA</text>

  <!-- LEFT GUIDE RAIL -->
  <g>
    <rect x="128" y="30" width="8" height="550" rx="2" fill="url(#rail-grad)"/>
    <!-- Rail clips -->
    <rect x="122" y="70" width="20" height="5" rx="1" fill="#1d3a8a" fill-opacity="0.45"/>
    <rect x="122" y="180" width="20" height="5" rx="1" fill="#1d3a8a" fill-opacity="0.45"/>
    <rect x="122" y="300" width="20" height="5" rx="1" fill="#1d3a8a" fill-opacity="0.45"/>
    <rect x="122" y="420" width="20" height="5" rx="1" fill="#1d3a8a" fill-opacity="0.45"/>
    <rect x="122" y="510" width="20" height="5" rx="1" fill="#1d3a8a" fill-opacity="0.45"/>
  </g>

  <!-- RIGHT GUIDE RAIL -->
  <g>
    <rect x="344" y="30" width="8" height="550" rx="2" fill="url(#rail-grad)"/>
    <!-- Rail clips -->
    <rect x="338" y="70" width="20" height="5" rx="1" fill="#1d3a8a" fill-opacity="0.45"/>
    <rect x="338" y="180" width="20" height="5" rx="1" fill="#1d3a8a" fill-opacity="0.45"/>
    <rect x="338" y="300" width="20" height="5" rx="1" fill="#1d3a8a" fill-opacity="0.45"/>
    <rect x="338" y="420" width="20" height="5" rx="1" fill="#1d3a8a" fill-opacity="0.45"/>
    <rect x="338" y="510" width="20" height="5" rx="1" fill="#1d3a8a" fill-opacity="0.45"/>
  </g>

  <!-- HOIST ROPE (dashed center line from machine room down to cab) -->
  <line x1="240" y1="22" x2="240" y2="280" stroke="#3b6fd4" stroke-width="1.5" stroke-opacity="0.5" stroke-dasharray="6 4"/>
  <!-- Rope to counterweight -->
  <line x1="210" y1="22" x2="210" y2="115" stroke="#3b6fd4" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="5 3"/>

  <!-- COUNTERWEIGHT -->
  <rect x="155" y="90" width="55" height="80" rx="3" fill="#1d3a8a" fill-opacity="0.12" stroke="#1d3a8a" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Counterweight internal mass lines -->
  <line x1="165" y1="105" x2="200" y2="105" stroke="#1d3a8a" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="165" y1="118" x2="200" y2="118" stroke="#1d3a8a" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="165" y1="131" x2="200" y2="131" stroke="#1d3a8a" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="165" y1="144" x2="200" y2="144" stroke="#1d3a8a" stroke-width="1" stroke-opacity="0.35"/>
  <text x="182" y="176" font-family="'Space Grotesk', Inter, sans-serif" font-size="9" fill="#1d3a8a" fill-opacity="0.5" text-anchor="middle">CONTRA-</text>
  <text x="182" y="186" font-family="'Space Grotesk', Inter, sans-serif" font-size="9" fill="#1d3a8a" fill-opacity="0.5" text-anchor="middle">PESO</text>

  <!-- ELEVATOR CABIN (positioned at floor 2 area, with filter/shadow) -->
  <g filter="url(#subtle-shadow)">
    <!-- Cabin body -->
    <rect x="147" y="270" width="186" height="160" rx="3" fill="url(#cab-grad)" stroke="#1d3a8a" stroke-width="2" stroke-opacity="0.7"/>

    <!-- Cabin shoe/guide bracket - left -->
    <rect x="136" y="285" width="14" height="30" rx="2" fill="#1d3a8a" fill-opacity="0.2" stroke="#3b6fd4" stroke-width="1.25"/>
    <rect x="136" y="355" width="14" height="30" rx="2" fill="#1d3a8a" fill-opacity="0.2" stroke="#3b6fd4" stroke-width="1.25"/>
    <!-- Cabin shoe/guide bracket - right -->
    <rect x="330" y="285" width="14" height="30" rx="2" fill="#1d3a8a" fill-opacity="0.2" stroke="#3b6fd4" stroke-width="1.25"/>
    <rect x="330" y="355" width="14" height="30" rx="2" fill="#1d3a8a" fill-opacity="0.2" stroke="#3b6fd4" stroke-width="1.25"/>

    <!-- Cabin top frame bar -->
    <rect x="147" y="270" width="186" height="12" rx="2" fill="#1d3a8a" fill-opacity="0.15"/>
    <!-- Cabin bottom frame bar -->
    <rect x="147" y="418" width="186" height="12" rx="2" fill="#1d3a8a" fill-opacity="0.15"/>

    <!-- Door panels (two-panel sliding door) -->
    <line x1="240" y1="282" x2="240" y2="418" stroke="#1d3a8a" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Left door panel detail -->
    <rect x="155" y="290" width="78" height="118" rx="2" fill="none" stroke="#3b6fd4" stroke-width="1" stroke-opacity="0.45"/>
    <!-- Right door panel detail -->
    <rect x="247" y="290" width="78" height="118" rx="2" fill="none" stroke="#3b6fd4" stroke-width="1" stroke-opacity="0.45"/>

    <!-- Door handle details -->
    <line x1="228" y1="345" x2="228" y2="360" stroke="#1d3a8a" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>
    <line x1="252" y1="345" x2="252" y2="360" stroke="#1d3a8a" stroke-width="2" stroke-linecap="round" stroke-opacity="0.6"/>

    <!-- Interior suggestion lines -->
    <line x1="157" y1="408" x2="325" y2="408" stroke="#1d3a8a" stroke-width="1" stroke-opacity="0.2"/>
  </g>

  <!-- LABEL: CABINA -->
  <line x1="340" y1="350" x2="368" y2="350" stroke="#3b6fd4" stroke-width="1" stroke-opacity="0.6" stroke-dasharray="3 2"/>
  <text x="372" y="348" font-family="'Space Grotesk', Inter, sans-serif" font-size="10" fill="#1d3a8a" fill-opacity="0.55">CABINA</text>

  <!-- LABEL: TRILHO -->
  <line x1="345" y1="450" x2="370" y2="440" stroke="#3b6fd4" stroke-width="1" stroke-opacity="0.6" stroke-dasharray="3 2"/>
  <text x="374" y="443" font-family="'Space Grotesk', Inter, sans-serif" font-size="10" fill="#1d3a8a" fill-opacity="0.55">TRILHO</text>

  <!-- LABEL: SAPATA -->
  <line x1="150" y1="300" x2="118" y2="306" stroke="#3b6fd4" stroke-width="1" stroke-opacity="0.6" stroke-dasharray="3 2"/>
  <text x="60" y="309" font-family="'Space Grotesk', Inter, sans-serif" font-size="10" fill="#1d3a8a" fill-opacity="0.55" text-anchor="middle">SAPATA</text>

  <!-- Machine room suggestion at top -->
  <rect x="100" y="10" width="280" height="18" rx="2" fill="#1d3a8a" fill-opacity="0.06" stroke="#1d3a8a" stroke-width="1" stroke-opacity="0.2"/>
  <text x="240" y="22" font-family="'Space Grotesk', Inter, sans-serif" font-size="9" fill="#1d3a8a" fill-opacity="0.45" text-anchor="middle" letter-spacing="1">CASA DE MÁQUINAS</text>

</svg>
